<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Рулетка событий</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="controls">
            <label for="roulette-select">Выберите рулетку:</label>
            <select id="roulette-select"></select>
        </div>
        <div id="wheel-container">
            <canvas id="wheel" width="500" height="500"></canvas>
            <div id="result-overlay">
                <h2 id="result-name"></h2>
                <p id="result-desc"></p>
                <img id="result-image" src="" alt="">
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
